name: Build APK

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            git zip unzip \
            autoconf libtool libltdl-dev automake pkg-config zlib1g-dev \
            libncurses-dev cmake libffi-dev libssl-dev
          pip install buildozer cython

      - name: Cache Android SDK/NDK and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

      - name: Remove dev user_profile.json
        run: rm -f user_profile.json

      - name: Build APK
        run: yes | buildozer android debug 2>&1

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CBSE-Study-Assistant-APK
          path: bin/*.apk
